<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>下单 - 初白代肝</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft Yahei",sans-serif}
body{background:#000;color:#fff}
.container{width:92%;max-width:800px;margin:0 auto}

header{background:#111;padding:16px 0;border-bottom:1px solid #333}
.nav{display:flex;justify-content:space-between;align-items:center}
.nav a{color:#ccc;text-decoration:none}

.box{background:#111;border:1px solid #333;border-radius:12px;padding:26px;margin:26px 0}
h3{margin-bottom:16px}
p{color:#ccc;line-height:1.6}

input,textarea{width:100%;padding:12px 14px;border-radius:8px;border:1px solid #444;background:#000;color:#fff;outline:none;margin-bottom:12px}
button{width:100%;padding:12px;background:#fff;color:#000;border:0;border-radius:8px;font-weight:700;margin-top:6px}

.back{text-align:center;margin:20px 0}
.back a{color:#ccc}
</style>
</head>
<body>

<header>
<div class="container nav">
<div>下单页面</div>
<a href="index.html">返回首页</a>
</div>
</header>

<div class="container">

<div class="box">
<h3>当前代肝项目</h3>
<p id="item" style="font-size:18px;color:#fff;font-weight:700"></p>
</div>

<div class="box">
<h3>快速下单表单</h3>
<input id="game" placeholder="游戏：原神/星穹铁道">
<input id="fu" placeholder="区服：官服/B服">
<input id="uid" placeholder="游戏UID">
<input id="pro" placeholder="代肝项目（自动填入）">
<textarea rows="4" placeholder="补充需求、备注"></textarea>
<button onclick="copy()">复制表单信息</button>
</div>

<div class="box">
<h3>联系方式（直接添加）</h3>
<p>微信：wese123123</p>
<p>QQ：1152995977</p>
<p>接单时间：10:00-24:00</p>
<br>
<p>支持：微信 / 支付宝 / QQ 转账</p>
<p>纯手工操作，绝不使用任何脚本，安全不封号</p>
</div>

<div class="back">
<a href="index.html">← 返回首页继续选择</a>
</div>

</div>

<script>
// 自动读取项目并显示
let item = localStorage.getItem("orderItem")||"未选择服务"
document.getElementById("item").innerText = item
document.getElementById("pro").value = item

// 复制表单
function copy(){
let g=document.getElementById("game").value
let f=document.getElementById("fu").value
let u=document.getElementById("uid").value
let p=document.getElementById("pro").value
let text = `游戏：${g}\n区服：${f}\nUID：${u}\n项目：${p}`
navigator.clipboard.writeText(text)
alert("已复制！直接粘贴发给我即可")
}

// 离开页面时清空记录
window.onbeforeunload=function(){
localStorage.removeItem("orderItem")
}
</script>

</body>
</html>
